<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Мече - Образователна Играчка</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AR Играчка">
    
    <!-- A-Frame & AR.js -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Billboard component - always face camera (Y-axis only for upright text)
        AFRAME.registerComponent('billboard', {
            init: function() {
                this.vector = new THREE.Vector3();
            },
            tick: function () {
                var camera = this.el.sceneEl.camera;
                if (!camera) return;

                // Get camera world position
                camera.getWorldPosition(this.vector);

                // Make element look at camera
                this.el.object3D.lookAt(this.vector);
            }
        });
    </script>
    
    <style>
        /* === MODERN UI STYLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Modern Instructions Overlay */
        #instructions {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(103, 126, 234, 0.95), rgba(118, 75, 162, 0.95));
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .instruction-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .instruction-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .instruction-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 16px;
        }
        
        .marker-preview {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border: 3px solid #667eea;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .marker-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        /* Modern UI Panel */
        #ui-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.95), rgba(56, 142, 60, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-weight: 600;
        }
        
        .score-badge {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .mode-badge {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 6px 12px;
            font-size: 14px;
        }
        
        /* Modern Mode Selector */
        #mode-selector {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .mode-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 90px;
        }
        
        .mode-btn.math {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .mode-btn.alphabet {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .mode-btn.quiz {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .mode-btn.active {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255,255,255,0.3);
        }
        
        .mode-btn:active {
            transform: scale(0.95);
        }
        
        .mode-icon {
            font-size: 24px;
        }
        
        .mode-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* Success Popup */
        #successPopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            border-radius: 25px;
            font-size: 28px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: none;
        }
        
        #successPopup.show {
            animation: popBounce 0.6s ease-out forwards;
        }
        
        @keyframes popBounce {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 999;
            text-align: center;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Mobile optimizations */
        @media (max-width: 480px) {
            #ui-panel {
                padding: 12px 20px;
                font-size: 14px;
            }
            
            .score-badge {
                font-size: 16px;
                padding: 6px 12px;
            }
            
            .mode-btn {
                padding: 12px 18px;
                min-width: 75px;
                font-size: 14px;
            }
            
            .mode-icon {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Modern Instructions Overlay -->
    <div id="instructions">
        <div class="instruction-card">
            <h2>🎯 AR Мече</h2>
            <p>Насочете камерата към Hiro маркера и докоснете правилните отговори!</p>
            <div class="marker-preview">
                <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Hiro Marker" crossorigin="anonymous">
            </div>
            <p style="font-size: 14px; color: #999;">Обектите ще се движат около маркера</p>
            <button class="start-btn" onclick="startAR()">Започни! 🚀</button>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div>Зареждане на AR...</div>
    </div>

    <!-- Modern UI Panel -->
    <div id="ui-panel" class="hidden">
        <div class="mode-badge" id="currentMode">Математика</div>
        <div class="score-badge">
            <span>🏆</span>

        </div>
    </div>

    <!-- Modern Mode Selector -->
    <div id="mode-selector" class="hidden">
        <button class="mode-btn math active" data-mode="math">
            <span class="mode-icon">🔢</span>
            <span class="mode-label">Математика</span>
        </button>
        <button class="mode-btn alphabet" data-mode="alphabet">
            <span class="mode-icon">🔤</span>

        </button>
        <button class="mode-btn quiz" data-mode="quiz">

    </div>

    <!-- Success Popup -->
    <div id="successPopup">
        🎉 Браво! 🎉
    </div>

    <!-- A-Frame AR Scene -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true;"
        id="arScene"
        class="hidden"
    >
        <!-- Preload 3D model -->
        <a-assets>
            <a-asset-item id="butterfly-model" src="assets/models/Butterfly.glb"></a-asset-item>
        </a-assets>

        <!-- Marker -->
        <a-marker preset="hiro" id="mainMarker" raycaster="objects: .clickable">
            
            <!-- ORBIT CONTAINER with rotation animation -->
            <a-entity id="orbitContainer" rotation="0 0 0" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;">
                
                <!-- Answer slots - will be populated dynamically from Firebase -->
                <a-entity id="answer-0" class="clickable" data-answer-index="0" position="0.8 0.5 0">
                    <!-- 3D Text Label - billboard always faces camera -->
                    <a-entity position="0 0.18 0" billboard>
                        <a-plane width="0.2" height="0.12" color="#22c55e" opacity="0.95"
                            side="double" shader="flat" position="0 0 -0.005"></a-plane>
                        <a-entity id="answer-text-0"
                            troika-text="value: 5; color: white; fontSize: 0.08; maxWidth: 0.18; textAlign: center; anchorX: center; anchorY: middle; outlineWidth: 0.008; outlineColor: #166534"
                            position="0 0 0.01"></a-entity>
                    </a-entity>
                    <!-- 3D Model will be loaded here -->
                    <a-entity class="model-container"></a-entity>
                </a-entity>
                
                <a-entity id="answer-1" class="clickable" data-answer-index="1" position="0 0.5 0.8">
                    <!-- 3D Text Label -->
                    <a-entity position="0 0.18 0" billboard>
                        <a-plane width="0.2" height="0.12" color="#ef4444" opacity="0.95"
                            side="double" shader="flat" position="0 0 -0.005"></a-plane>
                        <a-entity id="answer-text-1"
                            troika-text="value: 4; color: white; fontSize: 0.08; maxWidth: 0.18; textAlign: center; anchorX: center; anchorY: middle; outlineWidth: 0.008; outlineColor: #991b1b"
                            position="0 0 0.01"></a-entity>
                    </a-entity>
                    <!-- 3D Model will be loaded here -->
                    <a-entity class="model-container"></a-entity>
                </a-entity>
                
                <a-entity id="answer-2" class="clickable" data-answer-index="2" position="-0.8 0.5 0">
                    <!-- 3D Text Label -->
                    <a-entity position="0 0.18 0" billboard>
                        <a-plane width="0.2" height="0.12" color="#3b82f6" opacity="0.95"
                            side="double" shader="flat" position="0 0 -0.005"></a-plane>
                        <a-entity id="answer-text-2"
                            troika-text="value: 6; color: white; fontSize: 0.08; maxWidth: 0.18; textAlign: center; anchorX: center; anchorY: middle; outlineWidth: 0.008; outlineColor: #1e40af"
                            position="0 0 0.01"></a-entity>
                    </a-entity>
                    <!-- 3D Model will be loaded here -->
                    <a-entity class="model-container"></a-entity>
                </a-entity>
            </a-entity>

            <!-- Question Text -->
            <a-entity position="0 1.2 0">
                <a-plane width="2.5" height="0.6" color="#667eea" opacity="0.9"></a-plane>
                <a-text 
                    id="questionText"
                    value="2 + 3 = ?"
                    align="center"
                    color="#ffffff"
                    width="3"
                    position="0 0 0.01"
                ></a-text>
            </a-entity>

            <!-- Success particles -->
            <a-entity id="particles" visible="false">
                <a-sphere position="0 0.8 0" radius="0.08" color="#FFD700" opacity="0.8" 
                          animation="property: position; to: 0 1.8 0; dur: 1000; loop: 3; easing: easeOutQuad;"></a-sphere>
                <a-sphere position="0.3 0.8 0.3" radius="0.08" color="#FF6B6B" opacity="0.8" 
                          animation="property: position; to: 0.3 1.8 0.3; dur: 1100; loop: 3; easing: easeOutQuad; delay: 100;"></a-sphere>
                <a-sphere position="-0.3 0.8 -0.3" radius="0.08" color="#4ECDC4" opacity="0.8" 
                          animation="property: position; to: -0.3 1.8 -0.3; dur: 1200; loop: 3; easing: easeOutQuad; delay: 200;"></a-sphere>
            </a-entity>

            <!-- Flowers on ground -->
            <a-entity position="0 0 0">
                <a-circle position="-0.3 0.01 0.2" rotation="-90 0 0" radius="0.08" color="#fbbf24"></a-circle>
                <a-circle position="0.3 0.01 -0.2" rotation="-90 0 0" radius="0.06" color="#f472b6"></a-circle>
                <a-circle position="0.1 0.01 0.3" rotation="-90 0 0" radius="0.07" color="#a78bfa"></a-circle>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDQxYVcVSlxUZ6d4t87IppRRpD7r4R7DDk",
            authDomain: "ar-bear-education.firebaseapp.com",
            projectId: "ar-bear-education",
            storageBucket: "ar-bear-education.firebasestorage.app",
            messagingSenderId: "866761773486",
            appId: "1:866761773486:web:5dafa80d01a6b94372b83f",
            measurementId: "G-1ELMXFB3YN"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // === GLOBAL STATE ===
        let score = 0;
        let currentMode = 'math';
        let currentQuestion = null;
        let currentCorrectAnswer = null;
        let isProcessing = false;
        let markerVisible = false;
        let firebaseQuestions = { math: [], alphabet: [], quiz: [] };
        let useFirebase = false;
        let globalSettings = { correctSoundUrl: '', wrongSoundUrl: '' };

        // Preloaded audio elements for instant playback
        let preloadedSounds = { correct: null, wrong: null };

        // Fallback questions (used if Firebase is empty or fails)
        const defaultQuestions = {
            math: [
                { q: '2 + 3 = ?', answers: ['5', '4', '6'], correct: 0 },
                { q: '5 - 2 = ?', answers: ['3', '4', '2'], correct: 0 },
                { q: '4 + 4 = ?', answers: ['8', '7', '9'], correct: 0 },
                { q: '7 - 3 = ?', answers: ['4', '5', '3'], correct: 0 },
                { q: '6 + 2 = ?', answers: ['8', '7', '9'], correct: 0 },
            ],
            alphabet: [
                { q: 'Коя буква е първа?', answers: ['А', 'Б', 'В'], correct: 0 },
                { q: 'Коя идва след А?', answers: ['Б', 'В', 'Г'], correct: 0 },
                { q: 'Коя идва след Б?', answers: ['В', 'Г', 'Д'], correct: 0 },
            ],
            quiz: [
                { q: 'Слънцето топло ли е?', answers: ['Да', 'Не', '-'], correct: 0 },
                { q: 'Рибите летят ли?', answers: ['Да', 'Не', '-'], correct: 1 },
                { q: 'Небето синьо ли е?', answers: ['Да', 'Не', '-'], correct: 0 },
            ]
        };

        // Default orbit positions for answers (will orbit around marker)
        const orbitPositions = [
            { x: 0.8, y: 0.5, z: 0 },      // Right
            { x: 0, y: 0.5, z: 0.8 },      // Front
            { x: -0.8, y: 0.5, z: 0 }      // Left
        ];

        // === FIREBASE FUNCTIONS ===

        // Load global settings from Firebase
        async function loadGlobalSettings() {
            try {
                const doc = await db.collection('settings').doc('global').get();
                if (doc.exists) {
                    const data = doc.data();
                    globalSettings.correctSoundUrl = data.correctSoundUrl || '';
                    globalSettings.wrongSoundUrl = data.wrongSoundUrl || '';

                    // Preload audio files for instant playback
                    if (globalSettings.correctSoundUrl) {
                        preloadedSounds.correct = new Audio(globalSettings.correctSoundUrl);
                        preloadedSounds.correct.load();
                    }
                    if (globalSettings.wrongSoundUrl) {
                        preloadedSounds.wrong = new Audio(globalSettings.wrongSoundUrl);
                        preloadedSounds.wrong.load();
                    }
                    console.log('Loaded global settings and preloaded sounds');
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // Load questions from Firebase
        async function loadFirebaseQuestions() {
            try {
                // Load settings in parallel
                await loadGlobalSettings();

                const snapshot = await db.collection('questions').get();
                if (snapshot.empty) {
                    console.log('No Firebase questions, using defaults');
                    return;
                }

                // Reset Firebase questions
                firebaseQuestions = { math: [], alphabet: [], quiz: [] };

                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const category = data.category || 'math';

                    // Convert Firebase format to app format
                    const question = {
                        q: data.text,
                        answers: data.answers.map(a => a.text),
                        correct: data.correct,
                        // Store full answer data for model/sound info
                        answerData: data.answers,
                        soundUrl: data.soundUrl || null
                    };

                    if (firebaseQuestions[category]) {
                        firebaseQuestions[category].push(question);
                    }
                });

                // Check if we have any Firebase questions
                const totalQuestions = Object.values(firebaseQuestions).reduce((sum, arr) => sum + arr.length, 0);
                if (totalQuestions > 0) {
                    useFirebase = true;
                    console.log('Loaded', totalQuestions, 'questions from Firebase');
                }
            } catch (error) {
                console.error('Error loading Firebase questions:', error);
            }
        }

        // Get questions for current mode (Firebase or default)
        function getQuestions() {
            if (useFirebase && firebaseQuestions[currentMode].length > 0) {
                return firebaseQuestions[currentMode];
            }
            return defaultQuestions[currentMode];
        }

        // Load GLTF model with orbit positioning
        function loadGLTFModel(modelUrl, position, rotation, scale, answerIndex) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('gltf-model', modelUrl);
            entity.setAttribute('position', '0 0 0'); // Relative to parent
            entity.setAttribute('rotation', rotation || '0 0 0');
            entity.setAttribute('scale', scale || '0.02 0.02 0.02');
            entity.classList.add('loaded-model');
            return entity;
        }

        // === UI FUNCTIONS ===

        function startAR() {
            console.log('Starting AR...');
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('loading').classList.remove('hidden');
            
            setTimeout(async () => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('arScene').classList.remove('hidden');
                document.getElementById('ui-panel').classList.remove('hidden');
                document.getElementById('mode-selector').classList.remove('hidden');
                console.log('AR UI loaded');
                
                // Load questions from Firebase
                await loadFirebaseQuestions();
                setupModeButtons();
                setupMarkerEvents();
                setupTouchInteraction();
                loadQuestion();
            }, 1000);
        }

        function changeMode(mode) {
            if (isProcessing) return;
            
            currentMode = mode;
            
            // Update UI
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
            
            const modeNames = {
                'math': 'Математика',
                'alphabet': 'Азбука',
                'quiz': 'Викторина'
            };
            document.getElementById('currentMode').textContent = modeNames[mode];
            
            loadQuestion();
        }

        function setupModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    changeMode(btn.dataset.mode);
                });
            });
        }

        function setupMarkerEvents() {
            const marker = document.getElementById('mainMarker');
            marker.addEventListener('markerFound', () => {
                markerVisible = true;
                console.log('Marker found');
            });
            marker.addEventListener('markerLost', () => {
                markerVisible = false;
                console.log('Marker lost');
            });
        }

        function setupTouchInteraction() {
            const scene = document.getElementById('arScene');

            scene.addEventListener('loaded', () => {
                const canvas = scene.canvas;
                if (canvas) {
                    canvas.addEventListener('touchstart', handleCanvasTouch, { passive: false });
                    canvas.addEventListener('click', handleCanvasClick);
                }
            });
        }

        function handleCanvasTouch(e) {
            if (isProcessing || !markerVisible) return;
            const touch = e.touches[0];
            checkTouchOnAnswers(touch.clientX, touch.clientY);
        }

        function handleCanvasClick(e) {
            if (isProcessing || !markerVisible) return;
            checkTouchOnAnswers(e.clientX, e.clientY);
        }

        function checkTouchOnAnswers(touchX, touchY) {
            const scene = document.getElementById('arScene');
            if (!scene.renderer || !scene.camera) return;

            const canvas = scene.canvas;
            const rect = canvas.getBoundingClientRect();
            const threeCamera = scene.camera;

            const answers = [
                document.getElementById('answer-0'),
                document.getElementById('answer-1'),
                document.getElementById('answer-2')
            ];

            let closestAnswer = -1;
            let closestDistance = Infinity;
            const maxDistance = 80;

            answers.forEach((answer, index) => {
                if (!answer || answer.getAttribute('visible') === 'false') return;
                if (currentMode === 'quiz' && index === 2) return; // Hide 3rd option in quiz

                const obj = answer.object3D;
                if (!obj) return;

                const worldPos = new THREE.Vector3();
                obj.getWorldPosition(worldPos);

                const screenPos = worldPos.clone().project(threeCamera);

                const screenX = (screenPos.x * 0.5 + 0.5) * rect.width + rect.left;
                const screenY = (-screenPos.y * 0.5 + 0.5) * rect.height + rect.top;

                const distance = Math.sqrt(
                    Math.pow(touchX - screenX, 2) +
                    Math.pow(touchY - screenY, 2)
                );

                if (distance < closestDistance && distance < maxDistance) {
                    closestDistance = distance;
                    closestAnswer = index;
                }
            });

            if (closestAnswer >= 0) {
                checkAnswer(closestAnswer);
            }
        }

        function loadQuestion() {
            const questionList = getQuestions();
            currentQuestion = questionList[Math.floor(Math.random() * questionList.length)];
            currentCorrectAnswer = currentQuestion.correct;

            console.log('Loading question:', currentQuestion.q);

            document.getElementById('questionText').setAttribute('value', currentQuestion.q);

            // Play question sound if available
            if (currentQuestion.soundUrl) {
                const audio = new Audio(currentQuestion.soundUrl);
                audio.play().catch(e => console.log('Audio play failed:', e));
            }

            // Update answer text labels and load models
            currentQuestion.answers.forEach((answer, i) => {
                const textEl = document.getElementById('answer-text-' + i);
                const answerEntity = document.getElementById('answer-' + i);
                
                if (textEl) {
                    textEl.setAttribute('troika-text', 'value', answer);
                }

                // Clear previous models
                const modelContainer = answerEntity.querySelector('.model-container');
                if (modelContainer) {
                    modelContainer.innerHTML = '';
                }

                // Load model from Firebase or use default
                let modelUrl = '#butterfly-model'; // Default
                let scale = '0.02 0.02 0.02';
                let rotation = '0 0 0';

                if (currentQuestion.answerData && currentQuestion.answerData[i] && currentQuestion.answerData[i].modelUrl) {
                    modelUrl = currentQuestion.answerData[i].modelUrl;
                    scale = currentQuestion.answerData[i].scale || scale;
                    rotation = currentQuestion.answerData[i].rotation || rotation;
                }

                const modelEntity = loadGLTFModel(modelUrl, orbitPositions[i], rotation, scale, i);
                modelContainer.appendChild(modelEntity);

                // Set orbit position
                const pos = orbitPositions[i];
                answerEntity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            });

            // Show/hide 3rd answer based on mode
            const answer2 = document.getElementById('answer-2');
            if (currentMode === 'quiz') {
                answer2.setAttribute('visible', 'false');
            } else {
                answer2.setAttribute('visible', 'true');
            }
        }

        function checkAnswer(answerIndex) {
            if (isProcessing) return;
            
            isProcessing = true;
            const isCorrect = answerIndex === currentCorrectAnswer;
            
            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                showSuccess();
                showParticles();
                playSound('correct');
                
                setTimeout(() => {
                    loadQuestion();
                    isProcessing = false;
                }, 1500);
            } else {
                playSound('wrong');
                
                setTimeout(() => {
                    isProcessing = false;
                }, 500);
            }
        }

        function showSuccess() {
            const popup = document.getElementById('successPopup');
            popup.classList.add('show');
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 1500);
        }

        function showParticles() {
            const particles = document.getElementById('particles');
            particles.setAttribute('visible', 'true');
            
            setTimeout(() => {
                particles.setAttribute('visible', 'false');
            }, 3000);
        }

        function playSound(type) {
            // Play feedback sound using preloaded audio
            const preloadedAudio = type === 'correct' ? preloadedSounds.correct : preloadedSounds.wrong;
            if (preloadedAudio) {
                preloadedAudio.currentTime = 0;
                preloadedAudio.play().catch(e => console.log('Sound play failed:', e));
            }
        }
    </script>

    <!-- PWA Service Worker & Install Prompt -->
    <script src="pwa-install.js"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
